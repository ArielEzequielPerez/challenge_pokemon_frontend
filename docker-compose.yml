services:
  app:
    image: node:24-alpine
    container_name: pokemon-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules

    ports:
      - "5173:5173"
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

    environment:
      - CHOKIDAR_USEPOLLING=true
